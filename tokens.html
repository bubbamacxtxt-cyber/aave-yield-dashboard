<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token List</title>
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #FFFFFF;
            --accent-primary: #FF1744;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            padding: 20px;
            max-width: 400px;
            line-height: 1.6;
        }
        
        h1 { 
            color: var(--text-primary); 
            font-size: 1.5rem; 
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .nav { margin: 24px 0; }
        
        .nav a { 
            color: var(--text-primary); 
            text-decoration: none; 
            padding: 10px 20px;
            border: 1px solid var(--accent-primary);
            border-radius: 4px;
            font-weight: 500;
        }
        
        .nav a:hover { 
            background: var(--accent-primary); 
        }
        
        .count { 
            color: var(--text-secondary); 
            margin: 16px 0; 
            font-weight: 600;
        }
        
        .token-list { 
            background: var(--bg-secondary); 
            padding: 16px 20px; 
            border-radius: 4px;
            border: 2px solid var(--bg-tertiary);
            border-bottom: 2px solid var(--accent-primary);
        }
        
        .token { 
            padding: 12px 0; 
            border-bottom: 1px solid var(--bg-tertiary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }
        
        .token:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <h1>Token List</h1>
    <div class="nav"><a href="index.html">← Back to Dashboard</a></div>
    <div class="count" id="count">Loading...</div>
    <div class="token-list" id="list">Loading...</div>

    <script>
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                const STABLECOINS = ['USDC','USDT','DAI','USDe','USDS','FRAX','LUSD','GHO','crvUSD','sUSD','USDG','AUSD','RLUSD','USDtb','USCC','USDT0','sUSDe','syrupUSDC','syrupUSDT','USDbC','FDUSD','mUSD','sDAI','WXDAI','EURe','PT-'];
                const isStable = s => STABLECOINS.some(x => s.toUpperCase().includes(x.toUpperCase()));
                
                const symbols = [...new Set(data.topSupply.filter(r => isStable(r.symbol)).map(r => r.symbol))].sort();
                
                document.getElementById('count').textContent = symbols.length + ' unique stable tokens';
                document.getElementById('list').innerHTML = symbols.map(s => 
                    `<div class="token">${s}</div>`
                ).join('');
            })
            .catch(e => {
                document.getElementById('list').textContent = 'Error: ' + e.message;
            });
    </script>
</body>
</html>
